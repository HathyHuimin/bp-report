<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>血压监测报告</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#f8fafc;--card:#fff;--bd:#e2e8f0;--tx:#1e293b;--sub:#94a3b8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter','Noto Sans SC','PingFang SC',system-ui,sans-serif;background:var(--bg);color:var(--tx);line-height:1.5;}
.w{max-width:960px;margin:0 auto;padding:16px 20px;}
h1{font-size:24px;font-weight:900;letter-spacing:-.5px;}
.sub{color:var(--sub);font-size:13px;margin-top:4px;}
.badge{display:inline-block;padding:5px 13px;border-radius:20px;font-weight:700;font-size:13px;margin-top:8px;}
.pill-row{display:flex;gap:4px;background:#e2e8f0;border-radius:10px;padding:4px;width:fit-content;flex-wrap:wrap;}
.pill-row button{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;background:transparent;color:#64748b;transition:all .15s;}
.pill-row button.on{background:var(--tx);color:#fff;font-weight:700;}
.vtabs{display:flex;gap:3px;background:#f1f5f9;border-radius:8px;padding:3px;width:fit-content;flex-wrap:wrap;}
.vtabs button{padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:400;background:transparent;color:#64748b;transition:all .15s;}
.vtabs button.on{background:var(--tx);color:#fff;font-weight:700;}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:16px;}
.pc{padding:14px 16px;border-radius:12px;background:var(--card);border:1px solid var(--bd);}
.pc .lb{font-size:12px;color:var(--sub);font-weight:500;margin-bottom:6px;display:flex;justify-content:space-between;}
.pc .vl{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;}
.pc .vl span{color:var(--sub);font-weight:400;}
.pc .dt{font-size:11px;color:var(--sub);margin-top:4px;}
.sr{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.sc{flex:1 1 140px;padding:11px 14px;border-radius:10px;background:var(--card);border:1px solid var(--bd);}
.sc .sl{font-size:11px;color:var(--sub);font-weight:500;margin-bottom:2px;}
.sc .sv{font-size:19px;font-weight:800;font-variant-numeric:tabular-nums;}
.sc .sv small{font-size:11px;font-weight:400;color:var(--sub);margin-left:3px;}
.cb{background:var(--card);border-radius:12px;border:1px solid var(--bd);padding:18px 14px 10px;margin-bottom:14px;}
.cb h3{font-size:15px;font-weight:700;margin-bottom:2px;}
.cb .ds{font-size:12px;color:var(--sub);margin-bottom:12px;}
.lgr{display:flex;gap:16px;justify-content:center;margin-top:8px;font-size:12px;}
.lgr .d{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle;}
table{width:100%;border-collapse:collapse;font-size:12px;font-variant-numeric:tabular-nums;}
thead th{padding:5px 3px;text-align:center;}
tbody td{padding:3px;text-align:center;}
tbody tr:nth-child(even){background:#fafbfc;}
.hi{background:#fef2f2!important;color:#dc2626;font-weight:700;}
.lo{background:#eff6ff!important;color:#2563eb;}
.na{color:#d1d5db;}
.ft{margin-top:14px;font-size:11px;color:var(--sub);line-height:1.8;}
@media(max-width:640px){.w{padding:10px;}}
</style>
</head>
<body>

<h1>血压监测报告</h1>

<div id="hBadge"></div>

<div class="g3" id="pCards"></div>
<div class="sr" id="sCards"></div>
<div class="vtabs" id="vTabs" style="margin-bottom:14px"></div>
<div id="content"></div>

// ========== UTILS ==========
const PN={morning:'早上',noon:'中午',evening:'晚上'};
const PC={morning:'#d97706',noon:'#dc2626',evening:'#2563eb'};
const PCL={morning:'#fbbf24',noon:'#f87171',evening:'#93c5fd'};

function avg(a){if(!a||!a.length)return[null,null];return[Math.round(a.reduce((s,v)=>s+v[0],0)/a.length),Math.round(a.reduce((s,v)=>s+v[1],0)/a.length)];}
function bpCat(s,d){if(s>=180||d>=120)return{l:'高血压危象',c:'#7f1d1d',bg:'#fef2f2'};if(s>=140||d>=90)return{l:'高血压',c:'#dc2626',bg:'#fef2f2'};if(s>=130||d>=80)return{l:'血压偏高',c:'#d97706',bg:'#fffbeb'};if(s>=90&&d>=60)return{l:'正常',c:'#16a34a',bg:'#f0fdf4'};return{l:'偏低',c:'#2563eb',bg:'#eff6ff'};}
function calcStats(data){
  const byP={morning:[],noon:[],evening:[]},all=[];
  data.forEach(r=>{[{k:'morning',d:r.m},{k:'noon',d:r.n},{k:'evening',d:r.e}].forEach(({k,d})=>{if(d)d.forEach(v=>{byP[k].push(v);all.push(v);});});});
  function cs(a){if(!a.length)return null;const ss=a.map(v=>v[0]),ds=a.map(v=>v[1]);return{avgS:Math.round(ss.reduce((a,b)=>a+b,0)/ss.length),avgD:Math.round(ds.reduce((a,b)=>a+b,0)/ds.length),maxS:Math.max(...ss),minS:Math.min(...ss),maxD:Math.max(...ds),minD:Math.min(...ds),hiS:ss.filter(s=>s>=140).length,hiD:ds.filter(d=>d>=90).length,n:ss.length};}
  return{all:cs(all),morning:cs(byP.morning),noon:cs(byP.noon),evening:cs(byP.evening)};
}

// ========== CHART HELPERS ==========
let charts={};
function kill(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};}

const refLinePlugin={
  id:'bpRef',
  afterDraw(chart){
    if(chart.config.type==='bar') return;
    const y=chart.scales?.y;
    const area=chart.chartArea;
    if(!y||!area) return;
    const ctx=chart.ctx;
    const lbl={140:'⚠ 高压',90:'舒张警戒',60:'⚠ 低压',45:'⚠ 危险低压'};
    [{v:140,c:'#dc2626',w:1,d:[6,4]},{v:90,c:'#d97706',w:1,d:[6,4]},{v:60,c:'#e11d9c',w:2.5,d:[]},{v:45,c:'#e11d9c',w:2,d:[4,3]}].forEach(({v,c,w,d})=>{
      if(v<y.min||v>y.max) return;
      const yy=y.getPixelForValue(v);
      ctx.save();ctx.setLineDash(d);ctx.strokeStyle=c;ctx.lineWidth=w;
      ctx.beginPath();ctx.moveTo(area.left,yy);ctx.lineTo(area.right,yy);ctx.stroke();
      ctx.fillStyle=c;ctx.font=v<=60?'bold 11px sans-serif':'10px sans-serif';ctx.textAlign='right';
      ctx.fillText((lbl[v]||'')+' '+v,area.right-4,yy-4);ctx.restore();
    });
  }
};
Chart.register(refLinePlugin);

function lineOpts(yMin,yMax){return{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{position:'bottom',labels:{usePointStyle:true,font:{size:11}}}},scales:{x:{ticks:{font:{size:10},maxRotation:0},grid:{display:false}},y:{min:yMin,max:yMax,afterBuildTicks(axis){const base=[35,40,45,50,55,60,80,100,120,140,160,180].filter(v=>v>=yMin&&v<=yMax);axis.ticks=base.map(v=>({value:v}));},ticks:{font:{size:11},callback:function(v){return v<=60?v+'':v%20===0?v+'':'';}},grid:{color:function(ctx){return ctx.tick.value<60?'rgba(225,29,156,0.10)':ctx.tick.value===60?'rgba(225,29,156,0.25)':'#f1f5f9';}}}},elements:{line:{tension:.3}}};}

// ========== STATE ==========
let curMonth=ALL_MONTHS[0].id, curView='trend';

// ========== RENDER ==========
function render(){
  kill();
  if(curMonth==='cmp'){renderCompare();return;}
  const M=ALL_MONTHS.find(m=>m.id===curMonth);
  if(!M)return;
  const data=M.data, st=calcStats(data), oc=bpCat(st.all.avgS,st.all.avgD);

  document.getElementById('hSub').textContent=`${M.label} · ${M.days}天 · 共${st.all.n}次测量`;
  document.getElementById('hBadge').innerHTML=`<span class="badge" style="background:${oc.bg};color:${oc.c};border:1px solid ${oc.c}22">月均 ${st.all.avgS}/${st.all.avgD} · ${oc.l}</span>`;

  let pc='';
  ['morning','noon','evening'].forEach(k=>{const s=st[k];if(!s)return;const cat=bpCat(s.avgS,s.avgD);
    pc+=`<div class="pc" style="border-left:4px solid ${PC[k]}"><div class="lb"><span>${PN[k]}</span><span style="color:${cat.c};font-weight:600;font-size:11px">${cat.l}</span></div><div class="vl">${s.avgS}<span>/</span>${s.avgD}</div><div class="dt">范围 ${s.minS}–${s.maxS}/${s.minD}–${s.maxD} · ≥140次${s.hiS}</div></div>`;
  });
  document.getElementById('pCards').innerHTML=pc;

  let sc='';
  [{l:'总测量',v:st.all.n,u:'次',c:'#1e293b'},{l:'收缩压≥140',v:st.all.hiS,u:`(${Math.round(st.all.hiS/st.all.n*100)}%)`,c:'#dc2626'},{l:'舒张压≥90',v:st.all.hiD,u:`(${Math.round(st.all.hiD/st.all.n*100)}%)`,c:'#d97706'},{l:'脉压差均值',v:st.all.avgS-st.all.avgD,u:'mmHg',c:'#2563eb'}].forEach(s=>{
    sc+=`<div class="sc"><div class="sl">${s.l}</div><div class="sv" style="color:${s.c}">${s.v}<small>${s.u}</small></div></div>`;
  });
  document.getElementById('sCards').innerHTML=sc;
  renderView();
}

function renderView(){
  if(curMonth==='cmp')return;
  const M=ALL_MONTHS.find(m=>m.id===curMonth);
  if(!M)return;
  kill();
  const data=M.data, ct=document.getElementById('content');
  if(curView==='trend') buildTrend(data,ct);
  else if(curView==='detail') buildDetail(data,ct);
  else if(curView==='abnormal') buildAbnormal(data,M,ct);
  else if(curView==='pulse') buildPulse(data,ct);
  else if(curView==='weekly') buildWeekly(data,M,ct);
  else if(curView==='table') buildTable(data,ct);
}

// ========== VIEWS ==========
function buildTrend(data,ct){
  ct.innerHTML='<div class="cb"><h3>每日平均血压趋势</h3><div class="ds">实线=收缩压 · 虚线=舒张压 · 悬停查看原始数据</div><div style="position:relative;height:380px"><canvas id="cv"></canvas></div></div>';
  const lb=[],mS=[],mD=[],nS=[],nD=[],eS=[],eD=[];
  data.forEach(r=>{lb.push(r.day+'');const[ms,md]=avg(r.m),[ns,nd]=avg(r.n),[es,ed]=avg(r.e);mS.push(ms);mD.push(md);nS.push(ns);nD.push(nd);eS.push(es);eD.push(ed);});
  const opts=lineOpts(35,180);

function getAbnormals(data,monthLabel){
  const rows=[];
  data.forEach(r=>{
    [{k:'morning',d:r.m},{k:'noon',d:r.n},{k:'evening',d:r.e}].forEach((p,pi)=>{
      if(!p.d)return;
      p.d.forEach((v,vi)=>{
        const flags=[];
        if(v[0]>=140) flags.push({type:'收缩压≥140',cat:'sysHi',c:'#dc2626'});
        if(v[0]<90) flags.push({type:'收缩压<90',cat:'sysLo',c:'#2563eb'});
        if(v[1]>=90) flags.push({type:'舒张压≥90',cat:'diaHi',c:'#d97706'});
        if(v[1]<60) flags.push({type:'舒张压<60',cat:'diaLo',c:'#e11d9c'});
        if(flags.length){
          rows.push({day:r.day,period:p.k,idx:vi+1,sys:v[0],dia:v[1],flags,month:monthLabel||'',label:(monthLabel?monthLabel:'')+(r.day)+'日'+PN[p.k]+(vi+1)});
        }
      });
    });
  });
  return rows;
}

function buildAbnormal(data,M,ct){
  const rows=getAbnormals(data,M.label);
  const counts={sysHi:0,sysLo:0,diaHi:0,diaLo:0};
  rows.forEach(r=>r.flags.forEach(f=>counts[f.cat]++));
  const total=[];data.forEach(r=>{[r.m,r.n,r.e].forEach(p=>{if(p)p.forEach(()=>total.push(1));});});

  let html='<div class="sr">';
  [{l:'收缩压≥140',v:counts.sysHi,c:'#dc2626',icon:'↑'},{l:'收缩压<90',v:counts.sysLo,c:'#2563eb',icon:'↓'},{l:'舒张压≥90',v:counts.diaHi,c:'#d97706',icon:'↑'},{l:'舒张压<60',v:counts.diaLo,c:'#e11d9c',icon:'↓'}].forEach(s=>{
    html+=`<div class="sc"><div class="sl">${s.icon} ${s.l}</div><div class="sv" style="color:${s.c}">${s.v}<small>次 / ${total.length}测</small></div></div>`;
  });
  html+='</div>';

  html+=`<div class="cb"><h3>收缩压（高压）每日最差值</h3><div class="ds">每天所有测量中取最高和最低各一个 · 红点=最高值≥140 · 蓝点=最低值<90</div><div style="position:relative;height:300px"><canvas id="cvAbSys"></canvas></div></div>`;
  html+=`<div class="cb"><h3>舒张压（低压）每日最差值</h3><div class="ds">每天所有测量中取最高和最低各一个 · 橙点=最高值≥90 · 洋红点=最低值<60</div><div style="position:relative;height:300px"><canvas id="cvAbDia"></canvas></div></div>`;

  html+='<div class="cb" style="overflow-x:auto"><h3>异常记录明细（共'+rows.length+'条）</h3><div class="ds" style="margin-bottom:10px">按日期排列，标注异常类型</div>';
  html+='<table><thead><tr style="border-bottom:2px solid #1e293b"><th>日期</th><th>时段</th><th>收缩压</th><th>舒张压</th><th>异常类型</th></tr></thead><tbody>';
  rows.forEach(r=>{
    const flagHtml=r.flags.map(f=>`<span style="display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:600;background:${f.c}11;color:${f.c};margin-right:4px">${f.type}</span>`).join('');
    html+=`<tr style="border-bottom:1px solid #f1f5f9"><td style="font-weight:700">${r.day}日</td><td style="color:${PC[r.period]}">${PN[r.period]}#${r.idx}</td><td style="${r.flags.some(f=>f.cat.startsWith('sys'))?'font-weight:700':''}">${r.sys}</td><td style="${r.flags.some(f=>f.cat.startsWith('dia'))?'font-weight:700':''}">${r.dia}</td><td>${flagHtml}</td></tr>`;
  });
  html+='</tbody></table></div>';
  ct.innerHTML=html;

  // per-day worst values
  const dayLabels=[],sysMax=[],sysMin=[],diaMax=[],diaMin=[];

  // systolic chart

    {label:'每日最低收缩压',data:sysMin,borderColor:'#93c5fd',backgroundColor:'#93c5fd',borderWidth:1.5,pointRadius:sysMin.map(v=>v<90?7:3),pointBackgroundColor:sysMin.map(v=>v<90?'#2563eb':'#93c5fd80'),spanGaps:true},

    {label:'每日最高收缩压',data:abSysMax,borderColor:'#f87171',backgroundColor:'#f87171',borderWidth:1.5,pointRadius:abSysMax.map(v=>v>=140?7:2),pointBackgroundColor:abSysMax.map(v=>v>=140?'#dc2626':'#f8717180'),spanGaps:true},
    {label:'每日最低收缩压',data:abSysMin,borderColor:'#93c5fd',backgroundColor:'#93c5fd',borderWidth:1.5,pointRadius:abSysMin.map(v=>v!=null&&v<90?7:2),pointBackgroundColor:abSysMin.map(v=>v!=null&&v<90?'#2563eb':'#93c5fd80'),spanGaps:true},
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{usePointStyle:true,font:{size:11}}}},scales:{x:{ticks:{font:{size:9},maxRotation:0,autoSkip:true,maxTicksLimit:20},grid:{display:false}},y:{min:60,max:180,ticks:{font:{size:11},stepSize:10},grid:{color:'#f1f5f9'}}},elements:{line:{tension:.3}}},plugins:[abBandPlugin]});

  // diastolic worst-value chart
  charts.cvAbCmpDia=new Chart(document.getElementById('cvAbCmpDia'),{type:'line',data:{labels:abLabels,datasets:[
    {label:'每日最高舒张压',data:abDiaMax,borderColor:'#fdba74',backgroundColor:'#fdba74',borderWidth:1.5,pointRadius:abDiaMax.map(v=>v>=90?7:2),pointBackgroundColor:abDiaMax.map(v=>v>=90?'#d97706':'#fdba7480'),spanGaps:true},
    {label:'每日最低舒张压',data:abDiaMin,borderColor:'#f0abfc',backgroundColor:'#f0abfc',borderWidth:1.5,pointRadius:abDiaMin.map(v=>v!=null&&v<60?7:2),pointBackgroundColor:abDiaMin.map(v=>v!=null&&v<60?'#e11d9c':'#f0abfc80'),spanGaps:true},
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{usePointStyle:true,font:{size:11}}}},scales:{x:{ticks:{font:{size:9},maxRotation:0,autoSkip:true,maxTicksLimit:20},grid:{display:false}},y:{min:35,max:110,afterBuildTicks(axis){axis.ticks=[35,40,45,50,55,60,70,80,90,100,110].map(v=>({value:v}));},ticks:{font:{size:11}},grid:{color:function(ctx){return ctx.tick.value<60?'rgba(225,29,156,0.10)':ctx.tick.value===60?'rgba(225,29,156,0.25)':'#f1f5f9';}}}},elements:{line:{tension:.3}}},plugins:[abBandPlugin]});

  // abnormal count comparison table
  let abTbl='<thead><tr style="border-bottom:2px solid #1e293b"><th>月份</th><th style="color:#dc2626">收缩≥140</th><th style="color:#2563eb">收缩<90</th><th style="color:#d97706">舒张≥90</th><th style="color:#e11d9c">舒张<60</th><th>异常总次数</th><th>总测量</th><th>异常率</th></tr></thead><tbody>';
  ALL_MONTHS.forEach(m=>{
    const ab=getAbnormals(m.data,m.label);
    const c={sysHi:0,sysLo:0,diaHi:0,diaLo:0};
    ab.forEach(r=>r.flags.forEach(f=>c[f.cat]++));
    let total=0;m.data.forEach(r=>{[r.m,r.n,r.e].forEach(p=>{if(p)total+=p.length;});});
    const abTotal=ab.length;
    abTbl+=`<tr style="border-bottom:1px solid #f1f5f9"><td style="font-weight:700">${m.label}</td><td style="color:#dc2626;font-weight:${c.sysHi?700:400}">${c.sysHi}</td><td style="color:#2563eb;font-weight:${c.sysLo?700:400}">${c.sysLo}</td><td style="color:#d97706;font-weight:${c.diaHi?700:400}">${c.diaHi}</td><td style="color:#e11d9c;font-weight:${c.diaLo?700:400}">${c.diaLo}</td><td style="font-weight:700">${abTotal}</td><td>${total}</td><td style="font-weight:700">${Math.round(abTotal/total*100)}%</td></tr>`;
  });
  abTbl+='</tbody>';
  document.getElementById('abCmpTable').innerHTML=abTbl;

  // bar chart — x-axis = month×period, bars = 收缩/舒张, month label drawn on bar
  const periods=['morning','noon','evening'];
  const barLabels=[], barSys=[], barDia=[], barMonthTag=[];
  stats.forEach(s=>{
    periods.forEach(k=>{
      barLabels.push(s.label+' '+PN[k]);
      barSys.push(s[k]?.avgS||0);
      barDia.push(s[k]?.avgD||0);
      barMonthTag.push(s.label);
    });
  });
  const barLabelPlugin={id:'barLbl',afterDraw(chart){
    const ctx=chart.ctx;
    const typeNames=['收缩','舒张'];
    chart.data.datasets.forEach((ds,di)=>{
      const meta=chart.getDatasetMeta(di);
      meta.data.forEach((bar,i)=>{
        const val=ds.data[i]; if(!val)return;
        const h=bar.base-bar.y;
        const tag=barMonthTag[i]+(typeNames[di]||'');
        ctx.save(); ctx.textAlign='center';
        // value on top of bar
        ctx.fillStyle='#1e293b'; ctx.font='bold 12px Inter,sans-serif';
        ctx.fillText(val,bar.x,bar.y-6);
        // month+type tag inside bar
        if(h>28){
          ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.font='bold 11px Inter,sans-serif';
          ctx.fillText(tag,bar.x,bar.y+h/2);
        }
        ctx.restore();
      });
    });
  }};
  charts.cv1=new Chart(document.getElementById('cv1'),{type:'bar',data:{labels:barLabels,datasets:[
    {label:'收缩压',data:barSys,backgroundColor:barSys.map((_,i)=>{const mi=Math.floor(i/3);return['#3b82f6','#f97316','#8b5cf6','#06b6d4','#ec4899','#84cc16'][mi%6];}),borderRadius:4,barPercentage:.7},
    {label:'舒张压',data:barDia,backgroundColor:barDia.map((_,i)=>{const mi=Math.floor(i/3);return['#93c5fd','#fdba74','#c4b5fd','#67e8f9','#f9a8d4','#bef264'][mi%6];}),borderRadius:4,barPercentage:.7},
  ]},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:24}},plugins:{legend:{position:'bottom',labels:{font:{size:12},usePointStyle:true}}},scales:{x:{ticks:{font:{size:11}},grid:{display:false}},y:{min:50,max:155,grid:{color:'#f1f5f9'},ticks:{font:{size:11}}}}},plugins:[barLabelPlugin]});
}

// ========== INIT ==========
function init(){
  const mt=document.getElementById('mTabs');
  const allItems=[...ALL_MONTHS.map(m=>({id:m.id,l:m.label})),{id:'cmp',l:'月对比'}];
  allItems.forEach(t=>{
    const b=document.createElement('button');b.textContent=t.l;b.className=t.id===curMonth?'on':'';
    b.onclick=()=>{curMonth=t.id;mt.querySelectorAll('button').forEach(x=>x.className='');b.className='on';
      document.getElementById('vTabs').style.display=t.id==='cmp'?'none':'flex';render();};
    mt.appendChild(b);
  });

  const vt=document.getElementById('vTabs');
  [{id:'trend',l:'日均趋势'},{id:'detail',l:'逐次记录'},{id:'abnormal',l:'⚠ 异常'},{id:'pulse',l:'脉压差'},{id:'weekly',l:'周对比'},{id:'table',l:'数据表'}].forEach(t=>{
    const b=document.createElement('button');b.textContent=t.l;b.className=t.id===curView?'on':'';
    b.onclick=()=>{curView=t.id;vt.querySelectorAll('button').forEach(x=>x.className='');b.className='on';renderView();};
    vt.appendChild(b);
  });
  render();
}
init();
</script>
</body>
</html>
